<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery QR — 扫码展厅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nanoid@3.3.7/index.browser.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #161618;
      --surface-2: #1e1e21;
      --border: #2a2a2e;
      --border-2: #3a3a3f;
      --text-1: #f0ede8;
      --text-2: #8a8780;
      --text-3: #555550;
      --accent: #c9a96e;
      --accent-dim: rgba(201,169,110,0.15);
      --accent-2: #5b8a6e;
      --danger: #a65b5b;
      --danger-dim: rgba(166,91,91,0.15);
      --radius: 10px;
      --radius-lg: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
      --shadow-lg: 0 12px 60px rgba(0,0,0,0.7);
    }

    html { font-size: 16px; }
    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

    /* ── Nav ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      background: rgba(12,12,14,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-1);
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }
    .nav-right {
      display: flex; align-items: center; gap: 16px;
    }
    .storage-bar {
      display: flex; align-items: center; gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-3);
    }
    .storage-track {
      width: 80px; height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .storage-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .nav-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-badge:hover { border-color: var(--accent); color: var(--accent); }
    .nav-badge.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Layout ── */
    .page-admin {
      padding-top: 80px;
      padding-bottom: 120px;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Hero / Header ── */
    .page-header {
      text-align: center;
      padding: 48px 0 40px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 10px;
    }
    .page-header h1 em {
      font-style: italic;
      color: var(--accent);
    }
    .page-header p {
      color: var(--text-2);
      font-size: 1.1rem;
    }

    /* ── Grid ── */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    /* ── Media Card ── */
    .media-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
      opacity: 0;
      transform: translateY(20px);
    }
    .media-card.visible {
      animation: cardReveal 0.5s ease forwards;
    }
    @keyframes cardReveal {
      to { opacity: 1; transform: translateY(0); }
    }
    .media-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border-2);
    }
    .media-card-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
      background: var(--surface-2);
    }
    .media-card-thumb.video-thumb {
      position: relative;
    }
    .video-play-icon {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.3);
    }
    .video-play-icon::after {
      content: '';
      width: 44px; height: 44px;
      border: 2.5px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
    }
    .video-play-icon::before {
      content: '';
      position: absolute;
      width: 0; height: 0;
      border-left: 14px solid rgba(255,255,255,0.9);
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      margin-left: 4px;
    }
    .media-card-body {
      padding: 14px 16px;
    }
    .media-card-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .type-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .type-badge.image {
      background: rgba(91,138,110,0.2);
      color: var(--accent-2);
    }
    .type-badge.video {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .media-card-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-3);
    }
    .media-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .media-card-desc {
      font-size: 0.88rem;
      color: var(--text-2);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .media-card-actions {
      position: absolute;
      top: 10px; right: 10px;
      display: flex; gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .media-card:hover .media-card-actions {
      opacity: 1;
    }
    .card-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
    }
    .card-btn-qr {
      background: rgba(12,12,14,0.85);
      border: 1px solid var(--border-2);
      color: var(--text-1);
    }
    .card-btn-qr:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .card-btn-del {
      background: rgba(12,12,14,0.85);
      border: 1px solid var(--border-2);
      color: var(--text-1);
    }
    .card-btn-del:hover { background: var(--danger); color: white; border-color: var(--danger); }

    /* ── Upload Zone ── */
    .upload-section {
      margin-top: 8px;
    }
    .upload-zone {
      border: 1.5px dashed var(--border-2);
      border-radius: var(--radius-lg);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .upload-zone.dragover {
      transform: scale(1.01);
    }
    .upload-icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
      display: block;
    }
    .upload-zone h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .upload-zone p {
      color: var(--text-2);
      font-size: 0.9rem;
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }

    /* ── Form Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95);
      transition: transform 0.25s;
    }
    .modal-backdrop.open .modal {
      transform: scale(1);
    }
    .modal-preview {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: var(--radius);
      margin-bottom: 16px;
      background: var(--surface-2);
      display: block;
    }
    .modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: var(--text-2);
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text-1);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }
    .form-group textarea { min-height: 80px; }
    .modal-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 20px;
    }
    .btn {
      padding: 10px 22px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
    }
    .btn-ghost:hover { border-color: var(--text-2); color: var(--text-1); }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    .btn-danger:hover { filter: brightness(1.1); }

    /* ── QR Modal ── */
    .qr-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95);
      transition: transform 0.25s;
    }
    .modal-backdrop.open .qr-modal {
      transform: scale(1);
    }
    .qr-modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: 20px;
    }
    #qr-canvas {
      border-radius: var(--radius);
      display: block;
      margin: 0 auto 16px;
    }
    .qr-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-3);
      word-break: break-all;
      background: var(--surface-2);
      padding: 10px 14px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      text-align: left;
    }
    .qr-modal .modal-actions { justify-content: center; }

    /* ── Viewer Mode ── */
    .viewer-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-top: 70px;
    }
    .viewer-back {
      position: fixed;
      top: 18px; left: 20px;
      display: flex; align-items: center; gap: 8px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 0.88rem;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(12,12,14,0.7);
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      z-index: 10;
    }
    .viewer-back:hover { border-color: var(--accent); color: var(--accent); }
    .viewer-media-wrap {
      max-width: 90vw;
      max-height: 70vh;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: viewerIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes viewerIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    .viewer-media-wrap img,
    .viewer-media-wrap video {
      max-width: 90vw;
      max-height: 70vh;
      display: block;
      object-fit: contain;
    }
    .viewer-info {
      margin-top: 28px;
      max-width: 640px;
      text-align: center;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .viewer-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 400;
      margin-bottom: 10px;
    }
    .viewer-info h1 em { font-style: italic; color: var(--accent); }
    .viewer-info p {
      color: var(--text-2);
      font-size: 1.05rem;
      line-height: 1.7;
    }
    .viewer-qr-btn {
      margin-top: 28px;
      padding: 12px 28px;
      border: 1.5px solid var(--accent);
      border-radius: 30px;
      background: var(--accent-dim);
      color: var(--accent);
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .viewer-qr-btn:hover { background: var(--accent); color: var(--bg); }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-2);
    }
    .empty-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--text-1);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 0.95rem; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 12px 24px;
      font-size: 0.92rem;
      color: var(--text-1);
      z-index: 300;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      backdrop-filter: blur(8px);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--accent-2); color: var(--accent-2); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 250;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
      cursor: zoom-out;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .media-grid { grid-template-columns: 1fr; }
      .nav { padding: 0 16px; }
      .storage-bar { display: none; }
      .page-header { padding: 32px 0 28px; }
    }

    /* ── Upload form video preview ── */
    #modal-video-preview {
      width: 100%;
      max-height: 220px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      background: var(--surface-2);
      display: none;
    }
  </style>
</head>
<body>

<!-- ── Navigation ── -->
<nav class="nav" id="nav">
  <div class="nav-logo">Gallery QR</div>
  <div class="nav-right">
    <div class="storage-bar" id="storage-bar" style="display:none">
      <div class="storage-track"><div class="storage-fill" id="storage-fill"></div></div>
      <span id="storage-text">0 KB</span>
    </div>
    <span class="nav-badge active" id="nav-admin-btn" onclick="goAdmin()">🔧 管理</span>
  </div>
</nav>

<!-- ══════════════════════════════════════
     ADMIN MODE
══════════════════════════════════════ -->
<div id="page-admin" class="page-admin">
  <div class="container">
    <div class="page-header">
      <h1>扫码<span style="font-style:italic;color:var(--accent)">展厅</span></h1>
      <p>上传作品，生成二维码，扫码即可沉浸式浏览</p>
    </div>

    <!-- Grid -->
    <div class="media-grid" id="media-grid"></div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">🖼</div>
      <h3>还没有作品</h3>
      <p>上传你的第一件图片或视频，开始创建展厅</p>
    </div>

    <!-- Upload Zone -->
    <div class="upload-section">
      <div class="upload-zone" id="upload-zone">
        <span class="upload-icon">📁</span>
        <h3>拖拽上传 · 点击选择</h3>
        <p>支持图片和视频上传 · 上传到云端，扫码即可查看</p>
        <input type="file" id="file-input" accept="image/*,video/*" multiple>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     VIEWER MODE
══════════════════════════════════════ -->
<div id="page-viewer" style="display:none">
  <a class="viewer-back" href="?mode=admin" onclick="goAdmin(); return false;">← 返回管理</a>
  <div class="viewer-page">
    <div class="viewer-media-wrap" id="viewer-media-wrap"></div>
    <div class="viewer-info" id="viewer-info">
      <h1 id="viewer-title"></h1>
      <p id="viewer-desc"></p>
      <button class="viewer-qr-btn" onclick="openViewerQR()">📱 查看二维码</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MODALS
══════════════════════════════════════ -->

<!-- Upload Form Modal -->
<div class="modal-backdrop" id="upload-modal">
  <div class="modal">
    <img id="modal-preview" class="modal-preview" src="" alt="preview">
    <video id="modal-video-preview" src="" controls></video>
    <h3>完善作品信息</h3>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="form-title" placeholder="给作品起个名字">
    </div>
    <div class="form-group">
      <label>文字介绍</label>
      <textarea id="form-desc" placeholder="描述一下这件作品..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeUploadModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmUpload()">保存</button>
    </div>
  </div>
</div>

<!-- QR Modal -->
<div class="modal-backdrop" id="qr-modal">
  <div class="qr-modal">
    <h3 id="qr-modal-title">作品二维码</h3>
    <canvas id="qr-canvas"></canvas>
    <div class="qr-url" id="qr-url-text"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeQRModal()">关闭</button>
      <button class="btn btn-primary" onclick="downloadQR()">下载二维码</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-backdrop" id="del-modal">
  <div class="modal" style="text-align:center">
    <h3 style="margin-bottom:12px">确认删除？</h3>
    <p style="color:var(--text-2);margin-bottom:20px;font-size:0.95rem">删除后无法恢复。</p>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn btn-ghost" onclick="closeDelModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="preview">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  /* ─────────────────────────────────────────
     Constants & Config
  ───────────────────────────────────────── */
  const STORAGE_KEY = 'gallery_qr_items';
  const MAX_IMAGE_SIZE = 10 * 1024 * 1024; // 10MB
  const MAX_VIDEO_SIZE = 50 * 1024 * 1024; // 50MB

  // 本地 nanoid 备用（CDN 加载失败时使用）
  function nanoid(size = 10) {
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let result = '';
    for (let i = 0; i < size; i++) {
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
  }

  let items = [];
  let pendingFile = null;
  let pendingDataUrl = null;
  let deleteTargetId = null;
  let currentViewerId = null;

  /* ─────────────────────────────────────────
     Init
  ───────────────────────────────────────── */
  function init() {
    loadItems();
    const params = new URLSearchParams(window.location.search);
    const viewId = params.get('view');
    if (viewId) {
      showViewer(viewId);
    } else {
      showAdmin();
    }
    updateStorageBar();
  }

  /* ─────────────────────────────────────────
     Storage
  ───────────────────────────────────────── */
  function loadItems() {
    try {
      items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch { items = []; }
  }

  function saveItems() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    } catch (e) {
      showToast('存储失败', 'error');
    }
    updateStorageBar();
  }

  function updateStorageBar() {
    // 现在只存储URL，不需要显示存储条
    const bar = document.getElementById('storage-bar');
    if (items.length > 0) {
      bar.style.display = 'flex';
      document.getElementById('storage-fill').style.width = '5%';
      document.getElementById('storage-text').textContent = items.length + ' 个作品';
    }
  }

  /* ─────────────────────────────────────────
     Routing
  ───────────────────────────────────────── */
  function showAdmin() {
    history.pushState({}, '', '?mode=admin');
    document.getElementById('page-admin').style.display = 'block';
    document.getElementById('page-viewer').style.display = 'none';
    document.getElementById('nav').style.display = 'flex';
    document.getElementById('nav-admin-btn').textContent = '🔧 管理';
    renderGrid();
  }

  function showViewer(id) {
    const item = items.find(i => i.id === id);
    if (!item) { showToast('作品不存在', 'error'); showAdmin(); return; }
    currentViewerId = id;
    history.pushState({}, '', '?view=' + id);
    document.getElementById('page-admin').style.display = 'none';
    document.getElementById('page-viewer').style.display = 'block';
    document.getElementById('nav').style.display = 'none';

    const wrap = document.getElementById('viewer-media-wrap');
    if (item.type === 'image') {
      wrap.innerHTML = `<img src="${item.mediaData}" alt="${item.title}" onclick="openLightbox('${item.mediaData}')" style="cursor:zoom-in">`;
    } else {
      wrap.innerHTML = `<video src="${item.mediaData}" controls loop></video>`;
    }
    document.getElementById('viewer-title').innerHTML = item.title || '无标题';
    document.getElementById('viewer-desc').textContent = item.description || '';
  }

  function goAdmin() {
    history.pushState({}, '', '?mode=admin');
    showAdmin();
  }

  window.addEventListener('popstate', () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('view')) showViewer(params.get('view'));
    else showAdmin();
  });

  /* ─────────────────────────────────────────
     Render Grid
  ───────────────────────────────────────── */
  function renderGrid() {
    const grid = document.getElementById('media-grid');
    const empty = document.getElementById('empty-state');
    if (items.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = '';

    // Sort newest first
    const sorted = [...items].sort((a, b) => b.createdAt - a.createdAt);
    sorted.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'media-card';
      card.style.animationDelay = (idx * 60) + 'ms';

      const thumb = item.type === 'video'
        ? `<div class="media-card-thumb video-thumb">
             <div class="video-play-icon"></div>
           </div>`
        : `<img src="${item.mediaData}" class="media-card-thumb" alt="thumb">`;

      card.innerHTML = `
        ${thumb}
        <div class="media-card-actions">
          <button class="card-btn card-btn-qr" title="查看二维码" onclick="event.stopPropagation(); openQR('${item.id}')">📱</button>
          <button class="card-btn card-btn-del" title="删除" onclick="event.stopPropagation(); askDelete('${item.id}')">🗑</button>
        </div>
        <div class="media-card-body">
          <div class="media-card-meta">
            <span class="type-badge ${item.type}">${item.type === 'image' ? '图片' : '视频'}</span>
            <span class="media-card-date">${formatDate(item.createdAt)}</span>
          </div>
          <div class="media-card-title">${escapeHtml(item.title || '无标题')}</div>
          <div class="media-card-desc">${escapeHtml(item.description || '')}</div>
        </div>
      `;

      card.addEventListener('click', () => showViewer(item.id));

      grid.appendChild(card);

      // Trigger animation
      requestAnimationFrame(() => {
        requestAnimationFrame(() => card.classList.add('visible'));
      });
    });
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ─────────────────────────────────────────
     Upload Handling
  ───────────────────────────────────────── */
  const uploadZone = document.getElementById('upload-zone');
  const fileInput = document.getElementById('file-input');

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files);
    handleFiles(files);
  });

  fileInput.addEventListener('change', e => {
    const files = Array.from(e.target.files);
    handleFiles(files);
    e.target.value = '';
  });

  function handleFiles(files) {
    if (files.length === 0) return;
    const file = files[0]; // one at a time
    processFile(file);
  }

  function processFile(file) {
    const isImage = file.type.startsWith('image/');
    const isVideo = file.type.startsWith('video/');

    if (!isImage && !isVideo) {
      showToast('不支持的文件格式', 'error');
      return;
    }
    const limit = isImage ? MAX_IMAGE_SIZE : MAX_VIDEO_SIZE;
    if (file.size > limit) {
      showToast(`文件过大（${isImage ? '图片' : '视频'}最大${limit/1024/1024}MB）`, 'error');
      return;
    }

    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      pendingFile = file;
      pendingDataUrl = dataUrl;

      // 直接显示预览，不需要生成缩略图
      if (isVideo) {
        showUploadModal(dataUrl, 'video');
      } else {
        showUploadModal(dataUrl, 'image');
      }
    };
    reader.readAsDataURL(file);
  }

  function showUploadModal(dataUrl, type, thumbnail) {
    const modal = document.getElementById('upload-modal');
    const preview = document.getElementById('modal-preview');
    const videoPreview = document.getElementById('modal-video-preview');

    if (type === 'image') {
      preview.src = dataUrl;
      preview.style.display = 'block';
      videoPreview.style.display = 'none';
    } else {
      videoPreview.src = dataUrl;
      videoPreview.style.display = 'block';
      preview.style.display = 'none';
    }

    document.getElementById('form-title').value = pendingFile.name.replace(/\.[^.]+$/, '');
    document.getElementById('form-desc').value = '';
    modal.classList.add('open');
  }

  function closeUploadModal() {
    document.getElementById('upload-modal').classList.remove('open');
    pendingFile = null;
    pendingDataUrl = null;
  }

  function confirmUpload() {
    const title = document.getElementById('form-title').value.trim();
    const desc = document.getElementById('form-desc').value.trim();
    const type = pendingFile.type.startsWith('image/') ? 'image' : 'video';

    // 上传到 fileio
    showToast('正在上传到云端...', '');
    
    const formData = new FormData();
    formData.append('file', pendingFile);

    fetch('https://file.io/?expires=1w', {
      method: 'POST',
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if (data.success && data.link) {
        const url = data.link;
        const item = {
          id: typeof nanoid === 'function' ? nanoid(10) : Math.random().toString(36).substr(2, 10),
          type,
          mediaData: url,  // 存储云端URL
          title: title || pendingFile.name.replace(/\.[^.]+$/, ''),
          description: desc,
          createdAt: Date.now(),
        };

        items.push(item);
        saveItems();
        closeUploadModal();
        renderGrid();
        showToast('作品已上传，扫码即可查看', 'success');
      } else {
        showToast('上传失败，请重试', 'error');
      }
    })
    .catch(err => {
      console.error('Upload error:', err);
      showToast('上传失败: ' + err.message, 'error');
    });

    // Scroll to new card
    setTimeout(() => {
      const first = document.querySelector('.media-card');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  }

  /* ─────────────────────────────────────────
     QR Code
  ───────────────────────────────────────── */
  let currentQRUrl = '';

  function openQR(id) {
    console.log('openQR called with id:', id);
    const item = items.find(i => i.id === id);
    if (!item) {
      console.error('Item not found:', id);
      showToast('作品不存在', 'error');
      return;
    }

    console.log('Item found:', item);

    // Check QR library loaded
    if (typeof QRCode === 'undefined') {
      showToast('二维码库加载失败，请刷新页面重试', 'error');
      console.error('QRCode not loaded');
      return;
    }

    // 使用查看器页面，兼容微信
    const viewerUrl = new URL('https://weisong78.github.io/gallery-qr/viewer.html');
    viewerUrl.searchParams.set('url', item.mediaData);
    viewerUrl.searchParams.set('type', item.type);
    currentQRUrl = viewerUrl.toString();
    document.getElementById('qr-modal-title').textContent = item.title || '作品二维码';
    document.getElementById('qr-url-text').textContent = currentQRUrl;

    const canvas = document.getElementById('qr-canvas');
    QRCode.toCanvas(canvas, currentQRUrl, {
      width: 220,
      margin: 2,
      color: { dark: '#0c0c0e', light: '#f0ede8' },
    }, function(error) {
      if (error) {
        console.error('QR generation error:', error);
        showToast('二维码生成失败: ' + error.message, 'error');
        return;
      }
      document.getElementById('qr-modal').classList.add('open');
    });
  }

  function openViewerQR() {
    if (currentViewerId) openQR(currentViewerId);
  }

  function closeQRModal() {
    document.getElementById('qr-modal').classList.remove('open');
  }

  function getViewerUrl(id) {
    // 确保生成完整网址，包含协议和域名
    let base = window.location.origin + window.location.pathname;
    // 移除末尾斜杠
    base = base.replace(/\/$/, '');
    // 确保返回完整URL（https://用户名.github.io/仓库名/?view=xxx）
    return `${base}?view=${id}`;
  }

  function downloadQR() {
    const canvas = document.getElementById('qr-canvas');
    const link = document.createElement('a');
    link.download = 'qr-code.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('二维码已下载', 'success');
  }

  /* ─────────────────────────────────────────
     Delete
  ───────────────────────────────────────── */
  function askDelete(id) {
    deleteTargetId = id;
    document.getElementById('del-modal').classList.add('open');
  }

  function closeDelModal() {
    document.getElementById('del-modal').classList.remove('open');
    deleteTargetId = null;
  }

  function confirmDelete() {
    if (!deleteTargetId) return;
    items = items.filter(i => i.id !== deleteTargetId);
    saveItems();
    closeDelModal();
    renderGrid();
    showToast('已删除', 'success');
  }

  /* ─────────────────────────────────────────
     Lightbox
  ───────────────────────────────────────── */
  function openLightbox(dataUrl) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = dataUrl;
    lb.classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  /* ─────────────────────────────────────────
     Toast
  ───────────────────────────────────────── */
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ' ' + type : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  /* ─────────────────────────────────────────
     Backdrop click to close modals
  ───────────────────────────────────────── */
  document.querySelectorAll('.modal-backdrop').forEach(mb => {
    mb.addEventListener('click', e => {
      if (e.target === mb) {
        mb.classList.remove('open');
      }
    });
  });

  /* ─────────────────────────────────────────
     Keyboard
  ───────────────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-backdrop.open, .lightbox.open').forEach(el => {
        el.classList.remove('open');
      });
    }
  });

  /* ─────────────────────────────────────────
     Boot
  ───────────────────────────────────────── */
  init();
</script>
</body>
</html>
